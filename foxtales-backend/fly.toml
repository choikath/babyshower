# fly.toml app configuration file generated for foxtales-backend on 2026-06-15T18:31:27-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'foxtales-backend'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[env]
  NODE_ENV = "production"
  DB_DRIVER = "postgres"
  STORAGE_DRIVER = "supabase"
  AUDIO_BUCKET = "audio"
  SUPABASE_URL = "https://mhhqftrkitwjqripelvl.supabase.co"
  PUBLIC_BASE_URL = "https://foxtales-backend.fly.dev"   # your fly.dev URL for now
  SIGNED_URL_TTL_SEC = "600"
  TRUST_PROXY = "1"
  APPLE_TEAM_ID = "YOURTEAMID"
  IOS_BUNDLE_ID = "app.foxtales.ios"
  APPCLIP_BUNDLE_ID = "app.foxtales.ios.Clip"
