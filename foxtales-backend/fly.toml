app = "foxtales-backend"
primary_region = "sjc"

# ffmpeg is baked into the runtime image (Dockerfile) for the stitch pipeline.
# Point at it explicitly so Fly never falls back to buildpack auto-detection.
[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080          # matches PORT=8080 in the Dockerfile / env default
  force_https = true
  auto_stop_machines = "stop"   # free-tier friendly: machine sleeps when idle
  auto_start_machines = true    # ...and wakes on the next request (brief cold start)
  min_machines_running = 0
  processes = ["app"]

  # Confirms the process is actually serving, not just running.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
