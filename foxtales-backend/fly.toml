app = "foxtales-backend"
primary_region = "sjc"

# ffmpeg is baked into the runtime image (Dockerfile) for the stitch pipeline.
# Point at it explicitly so Fly never falls back to buildpack auto-detection.
[build]
  dockerfile = "Dockerfile"

# Non-secret runtime config (secrets like SUPABASE_* stay in `fly secrets`).
[env]
  # Open the shared prototype family to anonymous share-link contributors so
  # signed-out visitors at foxtales.app can "Finish & upload". Must match
  # FAMILY_ID in index.html.
  PUBLIC_CONTRIB_FAMILY_IDS = "00000000-0000-0000-0000-0000000000a1"
  # Emails allowed to read the whole inbox at foxtales.app/admin without a
  # family membership row. Comma-separated for more than one.
  ADMIN_EMAILS = "choikath@gmail.com"

[http_service]
  internal_port = 8080          # matches PORT=8080 in the Dockerfile / env default
  force_https = true
  auto_stop_machines = "stop"   # free-tier friendly: machine sleeps when idle
  auto_start_machines = true    # ...and wakes on the next request (brief cold start)
  min_machines_running = 0
  processes = ["app"]

  # Confirms the process is actually serving, not just running.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
